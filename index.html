function fp(n,ap){if(!n)return null;return ap.find(p=>p.name===n)||ap.find(p=>p.name===n.split('/')[0])||ap.find(p=>n===p.name.split('/')[0])||null}

/* ── NEW COMPAT LOGIC ──
   Score = base50 + env + flavor + pair_matches
   - Any pair of pokemon sharing a pref counts
   - More shared prefs = higher score
   - Lists ALL pairwise matches */
function doCompat(names,ap){
  const pk=names.map(n=>fp(n,ap)).filter(Boolean);
  if(pk.length<=1)return{score:100,reasons:pk.length?['只有一隻']:[],pairs:[]};
  
  let score=50;const reasons=[];
  
  // Environment: opposing pairs penalize
  const OPPOSE=[['明亮','昏暗'],['潮濕','乾燥'],['溫暖','涼爽']];
  const envs=[...new Set(pk.map(p=>p.env).filter(Boolean))];
  const conflicts=OPPOSE.filter(([a,b])=>envs.includes(a)&&envs.includes(b));
  if(envs.length===1){score+=15;reasons.push('✅ 相同環境: '+envs[0])}
  else if(conflicts.length>0){score-=conflicts.length*8;reasons.push('❌ 環境衝突: '+conflicts.map(([a,b])=>a+' ↔ '+b).join('、'))}
  else if(envs.length>=2){score+=3;reasons.push('📝 環境: '+envs.join('、'))}
  
  // Flavor: info only, no scoring
  const flavs=[...new Set(pk.map(p=>p.flavor).filter(Boolean))];
  if(flavs.length===1&&pk.every(p=>p.flavor))reasons.push('📝 口味: '+flavs.map(f=>FS[f]||f).join(''));
  else if(flavs.length>1)reasons.push('📝 口味: '+flavs.map(f=>FS[f]||f).join('、'));
  
  // Group by pref: which prefs are shared by 2+ pokemon, list who shares each
  const prefMap={}; // pref -> [pokemon names]
  pk.forEach(p=>{p.prefs.forEach(t=>{if(!prefMap[t])prefMap[t]=[];prefMap[t].push(p.name)})});
  const sharedPrefs=Object.entries(prefMap).filter(([t,names])=>names.length>=2).sort((a,b)=>b[1].length-a[1].length||a[0].localeCompare(b[0]));
  
  // Score: count total pairs across all shared prefs
  // For each shared pref with n pokemon, it contributes C(n,2) = n*(n-1)/2 pairs
  let totalPairs=0;
  sharedPrefs.forEach(([t,names])=>{totalPairs+=names.length*(names.length-1)/2});
  const prefBonus=Math.min(30,totalPairs*3);
  score+=prefBonus;
  
  if(sharedPrefs.length>0){
    reasons.push('✅ 相同喜好（'+sharedPrefs.length+' 項）');
    sharedPrefs.forEach(([t,names])=>{
      reasons.push('　• '+t+'：'+names.join('、'));
    });
  }else{
    reasons.push('⚠️ 沒有任何兩隻有相同喜好');
  }
  
  return{score:Math.max(0,Math.min(100,score)),reasons,sharedPrefs}
}

        </div>

/* ── Picker with sort toggle ── */
function Picker({cr,rn,area,onSel,onClose,ap,rooms}){
  const[s,setS]=useState('');const[ef,setEf]=useState('');const[sf,setSf]=useState('');const[ff,setFf]=useState('');
  const[sortMode,setSortMode]=useState('match');
  
  // Build map: pokemon name -> {area, room} or null
  const assignMap=useMemo(()=>{const m={};AREAS.forEach(a=>{const ar=rooms[a]||{};Object.entries(ar).forEach(([rn,mem])=>{mem.forEach(n=>{if(!m[n])m[n]=[];m[n].push({area:a,rn})})})});return m},[rooms]);
  
  const fl=useMemo(()=>{
    let list=ap.filter(p=>{
      if(s&&!p.name.includes(s)&&!String(p.id).includes(s))return false;
      if(ef&&p.env!==ef)return false;
      if(sf&&!p.skills.includes(sf))return false;
      if(ff&&p.flavor!==ff)return false;
      return true;
    });
    // Filter out pokemon already in THIS room (except 百變怪 which can be in multiple)
    list=list.filter(p=>!cr.includes(p.name));
    
    if(sortMode==='match'&&cr.length>0){
      return list.map(p=>{const c=doCompat([...cr,p.name],ap);return{...p,_score:c.score}}).sort((a,b)=>b._score-a._score||a.id-b.id);
    }
    return list.sort((a,b)=>a.id-b.id);
  },[s,ef,sf,ff,ap,cr,sortMode]);
  
  return(<div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.4)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:12}}>
    <div style={{background:'#fff',borderRadius:18,width:'100%',maxWidth:640,maxHeight:'82vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,.3)'}}>
      <div style={{padding:'14px 18px',borderBottom:'1px solid #eee',display:'flex',justifyContent:'space-between',alignItems:'center'}}><h3 style={{margin:0,fontSize:15}}>加入到 {area} 房間{rn}</h3><button onClick={onClose} style={{background:'none',border:'none',fontSize:18,cursor:'pointer'}}>✕</button></div>
      <div style={{padding:'10px 18px',display:'flex',gap:6,flexWrap:'wrap'}}>
        <input type="text" placeholder="搜尋..." value={s} onChange={e=>setS(e.target.value)} style={{flex:1,minWidth:100,padding:'6px 10px',borderRadius:8,border:'1px solid #ddd',fontSize:13,outline:'none'}}/>
        <select value={ef} onChange={e=>setEf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">環境</option>{ENVS.map(e=><option key={e} value={e}>{EE[e]} {e}</option>)}</select>
        <select value={ff} onChange={e=>setFf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">口味</option>{FLAVORS.map(f=><option key={f} value={f}>{FE[f]} {FS[f]}</option>)}</select>
        <select value={sf} onChange={e=>setSf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">專長</option>{SKILLS.map(x=><option key={x} value={x}>{x}</option>)}</select></div>
      <div style={{padding:'6px 18px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:11,color:'#666',fontWeight:600}}>排序：</span>
        <button onClick={()=>setSortMode('match')} disabled={cr.length===0} style={{
          background:sortMode==='match'?'#4f46e5':'#f3f4f6',color:sortMode==='match'?'#fff':'#555',
          border:'none',borderRadius:8,padding:'4px 12px',fontSize:11,fontWeight:600,
          cursor:cr.length===0?'not-allowed':'pointer',opacity:cr.length===0?.4:1
        }}>🎯 Match 高→低</button>
        <button onClick={()=>setSortMode('id')} style={{background:sortMode==='id'?'#4f46e5':'#f3f4f6',color:sortMode==='id'?'#fff':'#555',border:'none',borderRadius:8,padding:'4px 12px',fontSize:11,fontWeight:600,cursor:'pointer'}}>#️⃣ 編號</button>
        <span style={{marginLeft:'auto',fontSize:11,color:'#999'}}>共 {fl.length} 隻</span>
      </div>
      <div style={{flex:1,overflow:'auto',padding:'6px 18px'}}><div style={{display:'flex',flexWrap:'wrap',gap:5}}>
        {fl.map(p=>{const c=cr.length>0?doCompat([...cr,p.name],ap):null;
          const asn=assignMap[p.name];const hasRoom=asn&&asn.length>0;
          return(<div key={p.name} style={{position:'relative'}}>
            <Chip name={p.name} showFlavor compact onClick={()=>onSel(p.name)} ap={ap}/>
            {c&&<div style={{position:'absolute',top:-5,right:-5,background:c.score>=70?'#22c55e':c.score>=40?'#eab308':'#ef4444',color:'#fff',borderRadius:8,padding:'0 4px',fontSize:9,fontWeight:700}}>{c.score}</div>}
            {hasRoom&&<div style={{fontSize:9,color:'#e67e22',textAlign:'center',marginTop:1}}>📍{asn.map(a=>a.area).join('、')}</div>}
          </div>)})}</div></div></div></div>)
}

function FurnOverview({fd,allFurn,onCreateFurn}){

  const usage=useMemo(()=>{const c={};Object.values(fd||{}).forEach(af=>{Object.values(af).forEach(rl=>{(rl||[]).forEach(fn=>{c[fn]=(c[fn]||0)+1})})});return c},[fd]);
  const placements=useMemo(()=>{const p={};Object.entries(fd||{}).forEach(([area,af])=>{Object.entries(af).forEach(([rn,rl])=>{(rl||[]).forEach(fn=>{if(!p[fn])p[fn]=[];p[fn].push({area,rn})})})});return p},[fd]);
  const allTags=useMemo(()=>{const s=new Set();allFurn.forEach(f=>f.tags.forEach(t=>s.add(t)));return[...s].sort()},[allFurn]);
  const filtered=useMemo(()=>{let l=allFurn;if(tab!=='全部')l=l.filter(f=>f.label===tab);if(search)l=l.filter(f=>f.name.includes(search));if(tagF)l=l.filter(f=>f.tags.includes(tagF));return l},[tab,search,tagF,allFurn]);
  const byLabel=useMemo(()=>{const c={裝飾:0,休憩:0,玩具:0};allFurn.forEach(f=>{if(f.label&&c[f.label]!==undefined)c[f.label]++});return c},[allFurn]);
  const tu=Object.keys(usage).length;const tp=Object.values(usage).reduce((a,b)=>a+b,0);

      {Object.entries(byLabel).map(([l,c])=><div key={l} style={{background:'#fff',borderRadius:12,padding:'12px 20px',border:'1px solid #e5e7eb',textAlign:'center',minWidth:80}}><div style={{fontSize:22,fontWeight:800,color:'#6366f1'}}>{c}</div><div style={{fontSize:11,color:'#888'}}>{l}</div></div>)}
      <div style={{background:'#fff',borderRadius:12,padding:'12px 20px',border:'1px solid #e5e7eb',textAlign:'center',minWidth:80}}><div style={{fontSize:22,fontWeight:800,color:'#22c55e'}}>{tu}</div><div style={{fontSize:11,color:'#888'}}>已使用種類</div></div>
      <div style={{background:'#fff',borderRadius:12,padding:'12px 20px',border:'1px solid #e5e7eb',textAlign:'center',minWidth:80}}><div style={{fontSize:22,fontWeight:800,color:'#f59e0b'}}>{tp}</div><div style={{fontSize:11,color:'#888'}}>總放置數</div></div></div>
    <div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #e5e7eb'}}>
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        <input type="text" placeholder="搜尋..." value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:120,padding:'6px 10px',borderRadius:8,border:'1px solid #ddd',fontSize:13,outline:'none'}}/>
        <select value={tagF} onChange={e=>setTagF(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">全部標籤</option>{allTags.map(t=><option key={t} value={t}>{t}</option>)}</select>
        <button onClick={onCreateFurn} style={{background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>🪑 新增家具</button></div>
      <div style={{display:'flex',gap:6,marginBottom:12}}>{['全部','裝飾','休憩','玩具'].map(t=><button key={t} onClick={()=>setTab(t)} style={{background:tab===t?'#4338CA':'#f3f4f6',color:tab===t?'#fff':'#333',border:'none',borderRadius:8,padding:'5px 14px',cursor:'pointer',fontWeight:600,fontSize:12}}>{t}</button>)}</div>
      <div style={{fontSize:11,color:'#999',marginBottom:8}}>共 {filtered.length} 件</div>

function Stats({rooms,fd,ap}){
  const st=useMemo(()=>{const r={};AREAS.forEach(a=>{const ar=rooms[a]||{};const pk=[];Object.values(ar).forEach(arr=>arr.forEach(n=>{const p=fp(n,ap);if(p)pk.push(p)}));const sc={};SKILLS.forEach(s=>{sc[s]=pk.filter(p=>p.skills.includes(s)).length});sc['其他']=pk.filter(p=>p.other).length;const ec={};pk.forEach(p=>{if(p.env)ec[p.env]=(ec[p.env]||0)+1});const fc={};pk.forEach(p=>{if(p.flavor)fc[p.flavor]=(fc[p.flavor]||0)+1});r[a]={t:pk.length,sc,ec,fc,r:Object.keys(ar).length}});return r},[rooms,ap]);
  const SKILLS_PLUS=[...SKILLS,'其他'];
  const ts=useMemo(()=>{const t={};SKILLS_PLUS.forEach(s=>{t[s]=0;AREAS.forEach(a=>{t[s]+=(st[a]?.sc[s]||0)})});return t},[st]);
  const aa=useMemo(()=>{const s=new Set();AREAS.forEach(a=>{Object.values(rooms[a]||{}).forEach(arr=>arr.forEach(n=>s.add(n)))});return s},[rooms]);
  return(<div style={{padding:'0 20px 40px'}}>
    <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
      {[{l:'全部',v:ap.length,c:'#4f46e5'},{l:'已分配',v:aa.size,c:'#22c55e'},{l:'未分配',v:ap.length-aa.size,c:'#f59e0b'}].map(x=><div key={x.l} style={{background:'#fff',borderRadius:12,padding:'12px 20px',border:'1px solid #e5e7eb',textAlign:'center',minWidth:80}}><div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div><div style={{fontSize:11,color:'#888'}}>{x.l}</div></div>)}
      {AREAS.map(a=><div key={a} style={{background:'#fff',borderRadius:12,padding:'12px 20px',border:'1px solid #e5e7eb',textAlign:'center',minWidth:80}}><div style={{fontSize:22,fontWeight:800,color:'#6366f1'}}>{st[a]?.t||0}</div><div style={{fontSize:11,color:'#888'}}>{a}</div></div>)}</div>
    <div style={{background:'#fff',borderRadius:14,padding:16,marginBottom:16,border:'1px solid #e5e7eb'}}><h3 style={{margin:'0 0 12px',fontSize:15}}>📊 各區專長分布</h3>
      <div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead><tr style={{borderBottom:'2px solid #e5e7eb'}}><th style={{textAlign:'left',padding:'6px 8px',position:'sticky',left:0,background:'#fff',zIndex:1}}>專長</th>{AREAS.map(a=><th key={a} style={{padding:'6px 4px',textAlign:'center',whiteSpace:'nowrap',fontSize:11}}>{a}</th>)}<th style={{padding:'6px 8px',textAlign:'center',fontWeight:700}}>總計</th></tr></thead>
        <tbody>{SKILLS_PLUS.map(sk=><tr key={sk} style={{borderBottom:'1px solid #f3f4f6'}}><td style={{padding:'5px 8px',fontWeight:600,position:'sticky',left:0,background:'#fff',zIndex:1}}>{sk}</td>{AREAS.map(a=><td key={a} style={{textAlign:'center',padding:'5px 4px',color:st[a]?.sc[sk]?'#333':'#ddd'}}>{st[a]?.sc[sk]||0}</td>)}<td style={{textAlign:'center',padding:'5px 8px',fontWeight:700}}>{ts[sk]}</td></tr>)}
          <tr style={{borderTop:'2px solid #e5e7eb',fontWeight:700}}><td style={{padding:'6px 8px',position:'sticky',left:0,background:'#fff',zIndex:1}}>總隻數</td>{AREAS.map(a=><td key={a} style={{textAlign:'center',padding:'6px'}}>{st[a]?.t||0}</td>)}<td style={{textAlign:'center',padding:'6px'}}>{AREAS.reduce((s,a)=>s+(st[a]?.t||0),0)}</td></tr></tbody></table></div></div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:12}}>
      {AREAS.map(a=><div key={a} style={{background:'#fff',borderRadius:14,padding:14,border:'1px solid #e5e7eb'}}>
        <h4 style={{margin:'0 0 8px',fontSize:14}}>{a} <span style={{fontSize:11,color:'#999'}}>({st[a]?.r||0}間/{st[a]?.t||0}隻)</span></h4>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:'#555'}}>環境：</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4,marginBottom:8}}>{Object.entries(st[a]?.ec||{}).sort((x,y)=>y[1]-x[1]).map(([e,c])=><span key={e} style={{background:EC[e],borderRadius:6,padding:'2px 8px',fontSize:11}}>{EE[e]} {e} ×{c}</span>)}{!Object.keys(st[a]?.ec||{}).length&&<span style={{fontSize:11,color:'#ccc'}}>—</span>}</div>
        <div style={{fontSize:12,marginBottom:4,fontWeight:600,color:'#555'}}>口味：</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:4}}>{Object.entries(st[a]?.fc||{}).sort((x,y)=>y[1]-x[1]).map(([f,c])=><span key={f} style={{background:'#fef3c7',borderRadius:6,padding:'2px 8px',fontSize:11}}>{FE[f]} {FS[f]} ×{c}</span>)}{!Object.keys(st[a]?.fc||{}).length&&<span style={{fontSize:11,color:'#ccc'}}>—</span>}</div>
      </div>)}</div></div>)
}

function Unassigned({rooms,onDetail,ap}){
  const[s,setS]=useState('');const[ef,setEf]=useState('');const[ff,setFf]=useState('');const[sf,setSf]=useState('');const[pf,setPf]=useState('');
  const aa=useMemo(()=>{const x=new Set();AREAS.forEach(a=>{Object.values(rooms[a]||{}).forEach(arr=>arr.forEach(n=>x.add(n)))});return x},[rooms]);
  // Compute available 亂撒 products from current pokemon list
  const luanshaProducts=useMemo(()=>{const s=new Set();ap.forEach(p=>{if(p.skills?.includes('亂撒')&&p.product)s.add(p.product)});return[...s].sort()},[ap]);
  const ul=useMemo(()=>ap.filter(p=>{
    if(aa.has(p.name))return false;
    if(s&&!p.name.includes(s)&&!String(p.id).includes(s))return false;
    if(ef&&p.env!==ef)return false;
    if(ff&&p.flavor!==ff)return false;
    if(sf&&!p.skills.includes(sf))return false;
    if(sf==='亂撒'&&pf&&p.product!==pf)return false;
    return true
  }).sort((a,b)=>a.id-b.id),[aa,s,ef,ff,sf,pf,ap]);
  // Reset product filter when skill filter changes away from 亂撒
  useEffect(()=>{if(sf!=='亂撒'&&pf)setPf('')},[sf]);
  return(<div style={{padding:'0 20px 40px'}}><div style={{background:'#fff',borderRadius:14,padding:16,border:'1px solid #e5e7eb'}}>
    <h3 style={{margin:'0 0 12px',fontSize:15}}>📦 未分配 ({ul.length}/{ap.length})</h3>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
      <input type="text" placeholder="搜尋名稱/編號..." value={s} onChange={e=>setS(e.target.value)} style={{flex:1,minWidth:100,padding:'6px 10px',borderRadius:8,border:'1px solid #ddd',fontSize:13,outline:'none'}}/>
      <select value={ef} onChange={e=>setEf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">環境</option>{ENVS.map(e=><option key={e} value={e}>{EE[e]} {e}</option>)}</select>
      <select value={ff} onChange={e=>setFf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">口味</option>{FLAVORS.map(f=><option key={f} value={f}>{FE[f]} {FS[f]}</option>)}</select>
      <select value={sf} onChange={e=>setSf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">專長</option>{SKILLS.map(x=><option key={x} value={x}>{x}</option>)}</select>
      {sf==='亂撒'&&<select value={pf} onChange={e=>setPf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1.5px solid #d97706',fontSize:12,background:'#FFFBEB',fontWeight:600}}><option value="">亂撒的東西</option>{luanshaProducts.map(x=><option key={x} value={x}>{x}</option>)}</select>}
    </div>
    <div style={{fontSize:11,color:'#999',marginBottom:10}}>點擊 → 查看/編輯/分配</div>
    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>{ul.map(p=><div key={p.name}><Chip name={p.name} showFlavor compact onClick={()=>onDetail(p.name)} ap={ap}/><div style={{fontSize:9,color:'#aaa',textAlign:'center',marginTop:1}}>#{p.id}</div></div>)}</div>
    {!ul.length&&<div style={{textAlign:'center',padding:30,color:'#bbb'}}>{aa.size===ap.length?'🎉 全部分配完畢！':'沒有符合條件的'}</div>}
  </div></div>)
}

function App(){
  const[page,setPage]=useState('rooms');const[area,setArea]=useState('空空鎮');
  const[allPk,setAllPk]=useState([...INIT_PK]);
  const[allFurn,setAllFurn]=useState([...INIT_FURN]);
  const[rooms,setRooms]=useState(()=>Object.fromEntries(AREAS.map(a=>[a,{}])));
  const[fd,setFd]=useState({});
  const[fp2,setFp2]=useState(null);const[picker,setPicker]=useState(null);const[detail,setDetail]=useState(null);const[form,setForm]=useState(null);
  const[furnForm,setFurnForm]=useState(null);
  const[saved,setSaved]=useState(false);const[loaded,setLoaded]=useState(false);
  const[showHelp,setShowHelp]=useState(false);
  const[rs,setRs]=useState('');const[ref,setRef]=useState('');const[rsf,setRsf]=useState('');const[rff,setRff]=useState('');
  const[dragInfo,setDragInfo]=useState(null); // {name, fromRoom}

  useEffect(()=>{(async()=>{
    const pk=await store.get('pk');if(pk)setAllPk(pk);
    const fn=await store.get('furnList');if(fn)setAllFurn(fn);
    const rm=await store.get('rooms');if(rm)setRooms(rm);
    const fd2=await store.get('furn');if(fd2)setFd(fd2);
    setLoaded(true);
  })()},[]);

  const save=useCallback(async(nPk,nR,nF,nFL)=>{
    if(nPk){setAllPk(nPk);await store.set('pk',nPk)}
    if(nR){setRooms(nR);await store.set('rooms',nR)}
    if(nF){setFd(nF);await store.set('furn',nF)}
    if(nFL){setAllFurn(nFL);await store.set('furnList',nFL)}
    setSaved(true);setTimeout(()=>setSaved(false),1200)
  },[]);

  const ar=rooms[area]||{};const rns=Object.keys(ar).sort((a,b)=>Number(a)-Number(b));
  const aa=useMemo(()=>{const s=new Set();AREAS.forEach(a=>{Object.values(rooms[a]||{}).forEach(x=>x.forEach(n=>s.add(n)))});return s},[rooms]);
  const ac=useMemo(()=>{const c={};AREAS.forEach(a=>{c[a]=Object.values(rooms[a]||{}).reduce((s,x)=>s+x.length,0)});return c},[rooms]);
  const assign=useCallback((name,ta,tr)=>{const nr=JSON.parse(JSON.stringify(rooms));const ditto=isDitto(name,allPk);
    if(!ditto){AREAS.forEach(a=>{const x=nr[a]||{};Object.keys(x).forEach(r=>{x[r]=x[r].filter(n=>n!==name)})})}
    if(ta&&tr){if(!nr[ta])nr[ta]={};
      if(tr==='new'){const nums=Object.keys(nr[ta]).map(Number).filter(n=>!isNaN(n));nr[ta][(nums.length?Math.max(...nums)+1:1).toString()]=[name]}
      else{if(!nr[ta][tr])nr[ta][tr]=[];const mx=nr[ta][tr].some(n=>isDitto(n,allPk))||ditto?5:4;if(nr[ta][tr].length<mx)nr[ta][tr].push(name)}}
    save(null,nr,null)},[rooms,save,allPk]);
  const rmFromRoom=useCallback((rn,name)=>{const nr=JSON.parse(JSON.stringify(rooms));nr[area][rn]=nr[area][rn].filter(n=>n!==name);save(null,nr,null)},[rooms,area,save]);
  const movePk=useCallback((name,fromRn,toRn)=>{
    if(fromRn===toRn)return;
    const nr=JSON.parse(JSON.stringify(rooms));
    const toMem=nr[area][toRn]||[];
    const ditto=isDitto(name,allPk);
    const mx=toMem.some(n=>isDitto(n,allPk))||ditto?5:4;
    if(toMem.length>=mx)return;
    nr[area][fromRn]=(nr[area][fromRn]||[]).filter(n=>n!==name);
    if(!nr[area][toRn])nr[area][toRn]=[];
    nr[area][toRn].push(name);
    save(null,nr,null);
  },[rooms,area,save,allPk]);
  const addFromPicker=useCallback((rn,name)=>{const nr=JSON.parse(JSON.stringify(rooms));if(!nr[area])nr[area]={};const ditto=isDitto(name,allPk);const mem=nr[area][rn]||[];const mx=mem.some(n=>isDitto(n,allPk))||ditto?5:4;if(mem.length>=mx)return;if(!ditto){AREAS.forEach(a=>{const x=nr[a]||{};Object.keys(x).forEach(r=>{x[r]=x[r].filter(n=>n!==name)})})}if(!nr[area][rn])nr[area][rn]=[];nr[area][rn].push(name);save(null,nr,null);setPicker(null)},[rooms,area,save,allPk]);
  const addRoom=useCallback(()=>{const nr=JSON.parse(JSON.stringify(rooms));if(!nr[area])nr[area]={};const nums=Object.keys(nr[area]).map(Number).filter(n=>!isNaN(n));nr[area][(nums.length?Math.max(...nums)+1:1).toString()]=[];save(null,nr,null)},[rooms,area,save]);
  const delRoom=useCallback(num=>{if(!confirm('刪除房間 '+num+'？'))return;const nr=JSON.parse(JSON.stringify(rooms));delete nr[area][num];const nf=JSON.parse(JSON.stringify(fd));if(nf[area])delete nf[area][num];save(null,nr,nf)},[rooms,area,fd,save]);
  const setRF=useCallback((rn,list)=>{const nf=JSON.parse(JSON.stringify(fd));if(!nf[area])nf[area]={};nf[area][rn]=list;save(null,null,nf)},[fd,area,save]);
  const savePk=useCallback((pk,oldName)=>{let np=[...allPk];if(oldName){np=np.map(p=>p.name===oldName?{...pk}:{...p});if(oldName!==pk.name){const nr=JSON.parse(JSON.stringify(rooms));AREAS.forEach(a=>{const x=nr[a]||{};Object.keys(x).forEach(r=>{x[r]=x[r].map(n=>n===oldName?pk.name:n)})});save(np,nr,null);return}}else np.push({...pk});save(np,null,null)},[allPk,rooms,save]);
  const delPk=useCallback(name=>{const nr=JSON.parse(JSON.stringify(rooms));AREAS.forEach(a=>{const x=nr[a]||{};Object.keys(x).forEach(r=>{x[r]=x[r].filter(n=>n!==name)})});save(allPk.filter(p=>p.name!==name),nr,null)},[allPk,rooms,save]);
  const saveFn=useCallback((fn,oldName)=>{let nf=[...allFurn];if(oldName){nf=nf.map(f=>f.name===oldName?{...fn}:f)}else nf.push({...fn});save(null,null,null,nf)},[allFurn,save]);
  const doExport=()=>{const d=JSON.stringify({allPk,allFurn,rooms,fd},null,2);const b=new Blob([d],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='pokopia_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u)};
  const doImport=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.allPk&&d.rooms){save(d.allPk,d.rooms,d.fd||{},d.allFurn||[...INIT_FURN]);alert('匯入成功！')}else alert('格式錯誤')}catch(e){alert('檔案格式錯誤')}};r.readAsText(f)};i.click()};
  const resetAll=()=>{if(!confirm('全部重置？'))return;save([...INIT_PK],Object.fromEntries(AREAS.map(a=>[a,{}])),{},[ ...INIT_FURN])};
  const uc=allPk.length-aa.size;

  if(!loaded)return<div style={{padding:40,textAlign:'center',color:'#999'}}>載入中...</div>;

  return(
    <div style={{minHeight:'100vh',background:'#f8f9fc'}}>
      <div style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'#fff',padding:'16px 20px'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8,marginBottom:8}}>
          <div><h1 style={{margin:0,fontSize:20,fontWeight:800}}>🏡 Pokopia 寶可夢房間管理器</h1>
            <p style={{margin:'3px 0 0',fontSize:12,opacity:.85}}>
              <b>Match 分數 = 室友相容度</b>（0-100）｜越高代表寶可夢越適合住在一起
              <button onClick={()=>setShowHelp(!showHelp)} style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:6,padding:'1px 8px',fontSize:11,cursor:'pointer',marginLeft:8}}>{showHelp?'收起':'點擊我看計分說明'}</button>
            </p>
            {showHelp&&<div style={{marginTop:8,background:'rgba(255,255,255,.1)',borderRadius:8,padding:'8px 12px',fontSize:11,lineHeight:1.8}}>
              基礎 50 分｜環境全相同 +15｜不同但不衝突 +3<br/>
              衝突（明亮↔昏暗、潮濕↔乾燥、溫暖↔涼爽）每對 −8<br/>
              兩兩配對每有一個共同喜好 +3（最多 +30）<br/>
              分數 ≥70 為綠色｜69-40 為黃色｜&lt;40 為紅色
            </div>}
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <button onClick={()=>setForm({mode:'create'})} style={{background:'rgba(255,255,255,.2)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>✨ 新增</button>
            <button onClick={doExport} style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>📤 匯出</button>
            <button onClick={doImport} style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>📥 匯入</button></div></div></div>
      <div style={{display:'flex',background:'#fff',borderBottom:'1px solid #e5e7eb',overflow:'auto'}}>
        {[{k:'rooms',l:'🏠 房間'},{k:'unassigned',l:'📦 未分配 ('+uc+')'},{k:'furniture',l:'🪑 家具'},{k:'stats',l:'📊 統計'}].map(t=>
          <button key={t.k} onClick={()=>setPage(t.k)} style={{padding:'10px 16px',border:'none',background:page===t.k?'#fff':'transparent',borderBottom:page===t.k?'3px solid #4f46e5':'3px solid transparent',color:page===t.k?'#4f46e5':'#888',fontWeight:page===t.k?700:500,fontSize:13,cursor:'pointer',whiteSpace:'nowrap'}}>{t.l}</button>)}
        {saved&&<span style={{marginLeft:'auto',alignSelf:'center',marginRight:12,fontSize:11,color:'#22c55e',fontWeight:600}}>✓ 已儲存</span>}</div>

      {page==='stats'?<Stats rooms={rooms} fd={fd} ap={allPk}/>
       :page==='unassigned'?<Unassigned rooms={rooms} onDetail={setDetail} ap={allPk}/>
       :page==='furniture'?<FurnOverview fd={fd} allFurn={allFurn} onCreateFurn={()=>setFurnForm({mode:'create'})}/>
       :<>
        <div style={{display:'flex',background:'#fff',borderBottom:'1px solid #e5e7eb',overflow:'auto',padding:'0 12px'}}>
          {AREAS.map(a=><button key={a} onClick={()=>setArea(a)} style={{padding:'10px 14px',border:'none',background:'transparent',borderBottom:area===a?'3px solid #7c3aed':'3px solid transparent',color:area===a?'#7c3aed':'#888',fontWeight:area===a?700:500,fontSize:13,cursor:'pointer',whiteSpace:'nowrap'}}>{a} ({ac[a]||0})</button>)}</div>
        <div style={{padding:'10px 20px',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
          <button onClick={addRoom} style={{background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>+ 新增房間</button>
          <button onClick={resetAll} style={{background:'#FEE2E2',color:'#DC2626',border:'1px solid #FCA5A5',borderRadius:8,padding:'6px 14px',fontSize:12,fontWeight:600,cursor:'pointer'}}>↺ 全部重置</button>
          <span style={{marginLeft:'auto',fontSize:11,color:'#aaa'}}>{rns.length}間</span></div>
        <div style={{padding:'0 20px 8px',display:'flex',gap:6,flexWrap:'wrap'}}>
          <input type="text" placeholder="搜尋房間內寶可夢..." value={rs} onChange={e=>setRs(e.target.value)} style={{flex:1,minWidth:100,padding:'6px 10px',borderRadius:8,border:'1px solid #ddd',fontSize:12,outline:'none'}}/>
          <select value={ref} onChange={e=>setRef(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">環境</option>{ENVS.map(e=><option key={e} value={e}>{EE[e]} {e}</option>)}</select>
          <select value={rff} onChange={e=>setRff(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">口味</option>{FLAVORS.map(f=><option key={f} value={f}>{FE[f]} {FS[f]}</option>)}</select>
          <select value={rsf} onChange={e=>setRsf(e.target.value)} style={{padding:'6px 8px',borderRadius:8,border:'1px solid #ddd',fontSize:12}}><option value="">專長</option>{SKILLS.map(x=><option key={x} value={x}>{x}</option>)}</select>
        </div>
        {(()=>{
          const hasFilter=rs||ref||rsf||rff;
          const filteredRns=hasFilter?rns.filter(num=>{
            const mem=ar[num]||[];if(!mem.length)return false;
            return mem.some(n=>{const p=fp(n,allPk);if(!p)return false;
              if(rs&&!p.name.includes(rs)&&!String(p.id).includes(rs))return false;
              if(ref&&p.env!==ref)return false;
              if(rsf&&!p.skills.includes(rsf))return false;
              if(rff&&p.flavor!==rff)return false;
              return true;
            });
          }):rns;
          return <div style={{padding:'0 20px 40px',display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:12}}>
          {filteredRns.map(num=><RoomCard key={area+num} num={num} area={area} ap={allPk} mem={ar[num]||[]} rf={(fd[area]||{})[num]||[]}
            onRm={n=>rmFromRoom(num,n)} onFurn={()=>setFp2(num)} onAdd={()=>setPicker(num)}
            onDel={()=>delRoom(num)} onSetF={l=>setRF(num,l)} onDetail={setDetail}
            onDragStart={(name,fromRn)=>setDragInfo({name,fromRn})}
            onDropPk={(toRn)=>{if(dragInfo){movePk(dragInfo.name,dragInfo.fromRn,toRn);setDragInfo(null)}}}/>)}
          {!filteredRns.length&&<div style={{gridColumn:'1/-1',textAlign:'center',padding:40,color:'#bbb'}}>{hasFilter?'沒有符合條件的房間':'點「+ 新增房間」開始'}</div>}</div>
        })()}
      </>}

      {fp2!=null&&<><div onClick={()=>setFp2(null)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,.3)',zIndex:999}}/>
        <FurnPanel rn={fp2} pn={ar[fp2]||[]} ap={allPk} allFurn={allFurn} cf={(fd[area]||{})[fp2]||[]} onClose={()=>setFp2(null)} onSetF={l=>setRF(fp2,l)}/></>}
      {picker!=null&&<Picker cr={ar[picker]||[]} rn={picker} area={area} ap={allPk} rooms={rooms} onSel={n=>addFromPicker(picker,n)} onClose={()=>setPicker(null)}/>}
      {detail&&<PkDetail name={detail} onClose={()=>setDetail(null)} rooms={rooms} onAssign={assign} allPk={allPk} onDelete={delPk} onEdit={pk=>{setForm({mode:'edit',pk})}}/>}
      {form&&<PkForm onClose={()=>setForm(null)} onSave={savePk} allPk={allPk} editPk={form.mode==='edit'?form.pk:null}/>}
      {furnForm&&<FurnForm onClose={()=>setFurnForm(null)} onSave={saveFn} allFurn={allFurn} editFn={furnForm.mode==='edit'?furnForm.fn:null}/>}
    </div>)
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
